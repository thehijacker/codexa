name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Android/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    paths:
      - 'Android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Build debug APK
        working-directory: Android
        run: gradle assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: codexa-reader-debug
          path: Android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── Release APK ─────────────────────────────────────────────────────────
      # Priority 1: KEYSTORE_FILE secret → Google Play / production key (base64)
      # Priority 2: DEV_KEYSTORE_* secrets → persistent dev key stored in secrets
      # Priority 3: No secrets → generate a fresh throwaway keystore on the fly
      - name: Prepare release keystore
        id: keystore
        working-directory: Android
        env:
          KEYSTORE_FILE_B64:      ${{ secrets.KEYSTORE_FILE }}
          DEV_KEYSTORE_FILE_B64:  ${{ secrets.DEV_KEYSTORE_FILE }}
          DEV_KEYSTORE_PASSWORD:  ${{ secrets.DEV_KEYSTORE_PASSWORD }}
          DEV_KEY_ALIAS:          ${{ secrets.DEV_KEY_ALIAS }}
          DEV_KEY_PASSWORD:       ${{ secrets.DEV_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_FILE_B64" ]; then
            echo "Using production keystore from KEYSTORE_FILE secret"
            echo "$KEYSTORE_FILE_B64" | base64 -d > /tmp/release.jks
            echo "DEV_KEYSTORE_FILE=/tmp/release.jks"          >> $GITHUB_ENV
            echo "DEV_KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "DEV_KEY_ALIAS=${{ secrets.KEY_ALIAS }}"      >> $GITHUB_ENV
            echo "DEV_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          elif [ -n "$DEV_KEYSTORE_FILE_B64" ]; then
            echo "Using dev keystore from DEV_KEYSTORE_FILE secret"
            echo "$DEV_KEYSTORE_FILE_B64" | base64 -d > /tmp/release.jks
            echo "DEV_KEYSTORE_FILE=/tmp/release.jks"          >> $GITHUB_ENV
          else
            echo "No keystore secrets found — generating throwaway keystore"
            keytool -genkeypair \
              -keystore /tmp/release.jks \
              -alias codexa-release \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass codexa-ci-store \
              -keypass codexa-ci-key \
              -dname "CN=Codexa CI, OU=Codexa, O=Codexa, L=Unknown, ST=Unknown, C=SI"
            echo "DEV_KEYSTORE_FILE=/tmp/release.jks"  >> $GITHUB_ENV
            echo "DEV_KEYSTORE_PASSWORD=codexa-ci-store" >> $GITHUB_ENV
            echo "DEV_KEY_ALIAS=codexa-release"          >> $GITHUB_ENV
            echo "DEV_KEY_PASSWORD=codexa-ci-key"        >> $GITHUB_ENV
          fi

      - name: Build release APK
        working-directory: Android
        run: gradle assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: codexa-reader-release
          path: Android/app/build/outputs/apk/release/*.apk
          retention-days: 90
