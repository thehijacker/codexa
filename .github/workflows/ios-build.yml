name: Build iOS & TestFlight

on:
  # Uncomment when Apple Developer account and all secrets are configured:
  # push:
  #   branches: [ main, master ]
  #   paths:
  #     - 'iOS/**'
  #     - '.github/workflows/ios-build.yml'
  workflow_dispatch:
    inputs:
      server_url:
        description: 'Codexa server URL override (leave blank to use SERVER_URL secret)'
        required: false
        default: ''

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 75

    defaults:
      run:
        working-directory: iOS

    steps:
      # ── Source ───────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ──────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      # ── Ruby / Fastlane ───────────────────────────────────────────────────────
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: iOS

      # ── Capacitor: generate & sync iOS project ────────────────────────────────
      - name: Inject configuration
        env:
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
          SERVER_URL_SECRET: ${{ secrets.SERVER_URL }}
        run: |
          sed -i '' "s/REPLACE_WITH_YOUR_BUNDLE_ID/$BUNDLE_ID/" capacitor.config.json
          SERVER_URL="${{ github.event.inputs.server_url }}"
          if [ -z "$SERVER_URL" ]; then SERVER_URL="$SERVER_URL_SECRET"; fi
          if [ -n "$SERVER_URL" ]; then
            python3 -c "import json,sys;p='capacitor.config.json';d=json.loads(open(p).read());d.setdefault('server',{})['url']=sys.argv[1];open(p,'w').write(json.dumps(d,indent=2));print('Server URL:',sys.argv[1])" "$SERVER_URL"
          else
            echo "No server URL configured — app will show the setup screen"
          fi

      - name: Generate iOS project
        run: npx cap add ios

      - name: Sync web assets and plugins
        run: npx cap sync ios

      # ── Native patches ────────────────────────────────────────────────────────
      - name: Set app icon
        run: |
          SRC="../../public/icons/android-chrome-512x512.png"
          ICONSET="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          for SZ in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
            sips -z $SZ $SZ "$SRC" --out "$ICONSET/icon-${SZ}.png" > /dev/null
          done
          cat > "$ICONSET/Contents.json" << 'JSONEOF'
          {
            "images": [
              {"idiom":"iphone","size":"20x20","scale":"2x","filename":"icon-40.png"},
              {"idiom":"iphone","size":"20x20","scale":"3x","filename":"icon-60.png"},
              {"idiom":"iphone","size":"29x29","scale":"1x","filename":"icon-29.png"},
              {"idiom":"iphone","size":"29x29","scale":"2x","filename":"icon-58.png"},
              {"idiom":"iphone","size":"29x29","scale":"3x","filename":"icon-87.png"},
              {"idiom":"iphone","size":"40x40","scale":"2x","filename":"icon-80.png"},
              {"idiom":"iphone","size":"40x40","scale":"3x","filename":"icon-120.png"},
              {"idiom":"iphone","size":"60x60","scale":"2x","filename":"icon-120.png"},
              {"idiom":"iphone","size":"60x60","scale":"3x","filename":"icon-180.png"},
              {"idiom":"ipad","size":"20x20","scale":"1x","filename":"icon-20.png"},
              {"idiom":"ipad","size":"20x20","scale":"2x","filename":"icon-40.png"},
              {"idiom":"ipad","size":"29x29","scale":"1x","filename":"icon-29.png"},
              {"idiom":"ipad","size":"29x29","scale":"2x","filename":"icon-58.png"},
              {"idiom":"ipad","size":"40x40","scale":"1x","filename":"icon-40.png"},
              {"idiom":"ipad","size":"40x40","scale":"2x","filename":"icon-80.png"},
              {"idiom":"ipad","size":"76x76","scale":"1x","filename":"icon-76.png"},
              {"idiom":"ipad","size":"76x76","scale":"2x","filename":"icon-152.png"},
              {"idiom":"ipad","size":"83.5x83.5","scale":"2x","filename":"icon-167.png"},
              {"idiom":"ios-marketing","size":"1024x1024","scale":"1x","filename":"icon-1024.png"}
            ],
            "info":{"version":1,"author":"xcode"}
          }
          JSONEOF

      - name: Patch MainViewController — keep screen on, volume key navigation
        run: |
          cat > ios/App/App/MainViewController.swift << 'SWEOF'
          import UIKit
          import Capacitor
          import MediaPlayer
          import AVFoundation

          class MainViewController: CAPBridgeViewController {
              private var volumeView: MPVolumeView!
              private var lastVolume: Float = 0.5

              override func viewDidLoad() {
                  super.viewDidLoad()
                  UIApplication.shared.isIdleTimerDisabled = true
                  volumeView = MPVolumeView(frame: CGRect(x: -100, y: -100, width: 1, height: 1))
                  view.addSubview(volumeView)
                  let audioSession = AVAudioSession.sharedInstance()
                  try? audioSession.setCategory(.ambient, mode: .default, options: [])
                  try? audioSession.setActive(true)
                  setSystemVolume(0.5)
                  lastVolume = 0.5
                  NotificationCenter.default.addObserver(
                      self,
                      selector: #selector(volumeChanged(_:)),
                      name: NSNotification.Name(rawValue: "AVSystemController_SystemVolumeDidChangeNotification"),
                      object: nil
                  )
              }

              @objc func volumeChanged(_ notification: NSNotification) {
                  guard let userInfo = notification.userInfo,
                        let newVolume = userInfo["AVSystemController_AudioVolumeNotificationParameter"] as? Float
                  else { return }
                  if newVolume > lastVolume || newVolume == 1.0 {
                      self.webView?.evaluateJavaScript(
                          "window.dispatchEvent(new CustomEvent('volumeUp'));",
                          completionHandler: nil
                      )
                  } else if newVolume < lastVolume || newVolume == 0.0 {
                      self.webView?.evaluateJavaScript(
                          "window.dispatchEvent(new CustomEvent('volumeDown'));",
                          completionHandler: nil
                      )
                  }
                  DispatchQueue.main.asyncAfter(deadline: .now() + 0.05) {
                      self.setSystemVolume(0.5)
                      self.lastVolume = 0.5
                  }
              }

              private func setSystemVolume(_ value: Float) {
                  if let slider = volumeView.subviews.first(where: { $0 is UISlider }) as? UISlider {
                      slider.value = value
                  }
              }

              deinit {
                  NotificationCenter.default.removeObserver(self)
              }
          }
          SWEOF

      - name: Configure Info.plist — hide status bar, fullscreen
        run: |
          PLIST="ios/App/App/Info.plist"

          add_or_set() {
            /usr/libexec/PlistBuddy -c "Add :$1 $2 $3" "$PLIST" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Set :$1 $3" "$PLIST"
          }

          # Hide status bar at launch
          add_or_set UIStatusBarHidden              bool true
          # Disable per-view-controller overrides so hidden stays hidden
          add_or_set UIViewControllerBasedStatusBarAppearance bool false
          # Prevent Split View / Slide Over (required for true fullscreen lock)
          add_or_set UIRequiresFullScreen            bool true

      # ── Set version numbers in Xcode project ──────────────────────────────────
      - name: Set build and marketing version
        run: |
          BUILD_NUM=$(date -u +%Y%m%d%H%M)
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"

          # Replace every occurrence so Debug + Release configs are both updated
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*/CURRENT_PROJECT_VERSION = $BUILD_NUM/g" "$PBXPROJ"
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = 1.0.0/g" "$PBXPROJ"

          echo "Build number: $BUILD_NUM"

      # ── CocoaPods ─────────────────────────────────────────────────────────────
      - name: Pod install
        run: |
          cd ios/App
          pod install --repo-update

      # ── Sign & distribute ─────────────────────────────────────────────────────
      - name: Build and upload to TestFlight
        env:
          ASC_KEY_ID:       ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:    ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY:  ${{ secrets.ASC_PRIVATE_KEY }}
          BUNDLE_ID:        ${{ secrets.BUNDLE_ID }}
          MATCH_GIT_URL:    ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_USER:   ${{ secrets.MATCH_GIT_USER }}
          MATCH_GIT_TOKEN:  ${{ secrets.MATCH_GIT_TOKEN }}
          MATCH_PASSWORD:   ${{ secrets.MATCH_PASSWORD }}
        run: bundle exec fastlane beta
