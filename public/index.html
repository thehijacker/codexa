<!DOCTYPE html>
<html lang="sl" data-i18n-doc-title="library.page_title">
<head>
  <meta charset="UTF-8" />
  <script>document.documentElement.style.visibility='hidden'</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <script>
    (function () {
      try {
        var mode = localStorage.getItem('br_library_theme') || 'system';
        if (mode !== 'system') document.documentElement.setAttribute('data-lib-theme', mode);
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="/css/main.css" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Moja knjižnica — Codexa</title>
</head>
<body class="sidebar-layout">

  <!-- Left sidebar -->
  <aside class="app-sidebar" id="app-sidebar">
    <div class="sidebar-header">
      <a href="/" class="logo">📚 Codexa</a>
      <button id="sidebar-collapse-btn" class="sidebar-collapse-btn" title="Strni meni" aria-label="Strni meni">‹</button>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="sidebar-item sidebar-item-active" id="nav-all-books">
        <span class="sidebar-item-icon">📚</span>
        <span class="sidebar-item-label" data-i18n="sidebar.all_library">Vsa knjižnica</span>
      </a>

      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span class="sidebar-section-title">Police</span>
          <button id="add-shelf-btn" class="sidebar-add-btn" title="Dodaj polico">+</button>
        </div>
        <div id="shelves-list">
          <!-- Injected by JS -->
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <a href="/opds.html" class="sidebar-item">
        <span class="sidebar-item-icon">🌐</span>
        <span class="sidebar-item-label">Spletna knjižnica</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-username" id="username-label"></div>
      <a href="/settings.html" class="sidebar-item">
        <span class="sidebar-item-icon">⚙️</span>
        <span class="sidebar-item-label">Nastavitve</span>
      </a>
      <button id="logout-btn" class="sidebar-item sidebar-item-btn">
        <span class="sidebar-item-icon">↪</span>
        <span class="sidebar-item-label">Odjava</span>
      </button>
    </div>
  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Main body -->
  <div class="app-body">
    <!-- Mobile header with hamburger -->
    <header class="app-body-header">
      <button id="sidebar-open-btn" class="sidebar-hamburger" aria-label="Odpri meni">
        <span></span><span></span><span></span>
      </button>
      <a href="/" class="logo">📚 Codexa</a>
    </header>

    <main class="app-main">
      <div class="page-header">
        <h1 id="page-title" data-i18n="sidebar.all_library">Vsa knjižnica</h1>
        <div class="library-toolbar-controls flex gap-1 flex-wrap">
          <input type="search" id="search-input" data-i18n-placeholder="library.search_placeholder" placeholder="Iskanje…" />
          <div class="sort-menu-wrap">
            <select id="sort-select" class="sort-select hidden" aria-hidden="true" tabindex="-1">
              <option value="added_desc" data-i18n="library.sort_newest">Najnovejše</option>
              <option value="added_asc"  data-i18n="library.sort_oldest">Najstarejše</option>
              <option value="title_asc"  data-i18n="library.sort_title_az">Naslov A–Z</option>
              <option value="title_desc" data-i18n="library.sort_title_za">Naslov Z–A</option>
              <option value="author_asc" data-i18n="library.sort_author_az">Avtor A–Z</option>
              <option value="progress_desc" data-i18n="library.sort_progress">Napredek</option>
            </select>
            <button id="sort-menu-btn" class="sort-menu-btn" aria-haspopup="listbox" aria-expanded="false" aria-controls="sort-menu-list" title="Razvrsti knjige">
              <span id="sort-menu-label">Najnovejše</span>
              <span class="sort-menu-caret">▾</span>
            </button>
            <div id="sort-menu-list" class="sort-menu-list hidden" role="listbox" aria-label="Vrstni red knjig"></div>
          </div>
          <button id="edit-mode-btn" class="btn btn-secondary" data-i18n="library.btn_edit">Uredi</button>
          <div class="upload-menu-wrap">
            <button id="upload-btn" class="btn btn-primary">+ <span class="upload-btn-label" data-i18n="library.add_book">Dodaj knjigo </span>▾</button>
            <div id="upload-menu" class="upload-menu hidden">
              <button id="upload-file-btn" class="upload-menu-item" data-i18n="library.upload_file">📂 Naloži datoteko</button>
              <a href="/opds.html" class="upload-menu-item" data-i18n="sidebar.online_library">🌐 Spletna knjižnica</a>
            </div>
          </div>
        </div>
      </div>

      <!-- Edit mode toolbar -->
      <div id="edit-toolbar" class="edit-toolbar hidden">
        <span id="edit-selected-count" class="edit-count">0 izbranih</span>
        <button id="edit-assign-btn" class="btn btn-secondary btn-sm" disabled data-i18n="library.btn_assign">Dodeli polici</button>
        <button id="edit-remove-btn" class="btn btn-secondary btn-sm hidden" disabled data-i18n="library.btn_remove">Odstrani iz police</button>
        <button id="edit-delete-btn" class="btn btn-danger btn-sm" disabled data-i18n="library.btn_delete">Izbriši</button>
      </div>

      <!-- Series filter chip -->
      <div id="series-filter-bar" class="series-filter-bar hidden">
        <span class="series-filter-label" data-i18n="library.series_label">Serija:</span>
        <span id="series-filter-name" class="series-filter-name"></span>
        <button id="series-filter-clear" class="series-filter-clear" data-i18n-title="library.clear_filter" title="Počisti filter">✕</button>
      </div>

      <!-- Upload drop zone -->
      <div class="drop-zone hidden" id="drop-zone">
        <div style="font-size:2.5rem;margin-bottom:.75rem">📂</div>
        <p style="margin-bottom:.5rem" data-i18n="library.drop_hint1">Povlecite EPUB datoteke sem</p>
        <p style="font-size:.85rem" data-i18n="library.drop_hint2">ali kliknite za izbiro</p>
        <input type="file" id="file-input" accept=".epub" multiple />
      </div>

      <!-- Upload progress -->
      <div id="upload-status" class="hidden" style="margin-bottom:1rem"></div>

      <!-- Book grid -->
      <div id="book-grid" class="book-grid"></div>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon">📖</div>
        <p data-i18n="library.empty_msg">Vaša knjižnica je prazna.</p>
        <button id="empty-upload-btn" class="btn btn-primary" data-i18n="library.add_first">Dodaj prvo knjigo</button>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>

  <!-- Pre-apply collapsed sidebar to prevent flash on load -->
  <script>try { if (localStorage.getItem('sidebarCollapsed') === '1') document.getElementById('app-sidebar').classList.add('collapsed'); } catch {}</script>

  <script type="module" src="/js/library.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/js/sw.js').catch(() => {});
    }

    const sidebar     = document.getElementById('app-sidebar');
    const overlay     = document.getElementById('sidebar-overlay');
    const openBtn     = document.getElementById('sidebar-open-btn');
    const collapseBtn = document.getElementById('sidebar-collapse-btn');

    function openSidebar()  { sidebar.classList.add('open');    overlay.classList.add('visible'); }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('visible'); }

    openBtn.addEventListener('click', openSidebar);
    overlay.addEventListener('click', closeSidebar);

    collapseBtn.addEventListener('click', () => {
      const collapsed = sidebar.classList.toggle('collapsed');
      collapseBtn.textContent = collapsed ? '›' : '‹';
      collapseBtn.title = collapsed ? 'Razširi meni' : 'Strni meni';
      localStorage.setItem('sidebarCollapsed', collapsed ? '1' : '0');
    });

    if (localStorage.getItem('sidebarCollapsed') === '1') {
      sidebar.classList.add('collapsed');
      collapseBtn.textContent = '›';
      collapseBtn.title = 'Razširi meni';
    }
  </script>
</body>
</html>
