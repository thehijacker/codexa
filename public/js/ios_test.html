<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS Gesture & Selection Debugger</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; padding: 15px; background: #f4f4f9; 
            overscroll-behavior: none; /* Prepreči "rubber-banding" na iOS */
        }
        #log { 
            height: 200px; overflow-y: auto; background: #1e1e1e; color: #00ff00; 
            font-family: 'Courier New', monospace; font-size: 11px; padding: 10px; 
            border-radius: 8px; border: 2px solid #333; margin-bottom: 15px;
        }
        .test-area {
            border: 3px dashed #bbb; background: white; height: 350px; 
            position: relative; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; font-size: 18px; color: #444;
            touch-action: none; /* Ključno: pove brskalniku, da bomo sami upravljali kretnje */
        }
        .edge {
            position: absolute; top: 0; bottom: 0; width: 60px;
            background: rgba(255, 0, 0, 0.05); display: flex; 
            align-items: center; justify-content: center;
            font-size: 10px; color: #ff0000; font-weight: bold; pointer-events: none;
        }
        .right { right: 0; border-left: 1px solid rgba(255,0,0,0.2); }
        .left { left: 0; border-right: 1px solid rgba(255,0,0,0.2); }
        .highlight { background: #fff3cd; padding: 2px 5px; border-radius: 4px; border: 1px solid #ffeeba; }
        button { margin-top: 10px; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="log">Logi se bodo pojavili tukaj...</div>

    <div class="test-area" id="touchZone">
        <div class="edge left">ROB L</div>
        <div class="edge right">ROB D</div>
        
        <p>Preizkusi kretnje:</p>
        <div style="font-weight: bold; margin: 10px;">
            ← SWIPE → <br>
            ↑ SWIPE ↓
        </div>
        <p>Dolg pritisk za slovar:</p>
        <span id="targetWord" class="highlight">GORENJSKA</span>

        <button onclick="document.getElementById('log').innerHTML = ''">Počisti loge</button>
    </div>

    <script>
        const logEl = document.getElementById('log');
        const zone = document.getElementById('touchZone');
        const target = document.getElementById('targetWord');
        
        function log(msg) {
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}`;
            logEl.prepend(entry);
        }

        let startX = 0;
        let startY = 0;
        let startTime = 0;
        let targetTimer = null;

        // PREPREČEVANJE IOS SISTEMSKEGA MENIJA (ZELO POMEMBNO)
        // To prepreči "Copy/Paste" meni, ko držite prst na elementu
        window.oncontextmenu = function(event) {
            event.preventDefault();
            event.stopPropagation();
            log("Sistemski meni blokiran.");
            return false;
        };

        zone.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            startTime = Date.now();
            log(`Start: ${Math.round(startX)}, ${Math.round(startY)}`);
        }, { passive: false });

        zone.addEventListener('touchend', (e) => {
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            const diffX = endX - startX;
            const diffY = endY - startY;
            const duration = Date.now() - startTime;

            // Minimalna razdalja za swipe (v pikslih)
            const threshold = 50;

            if (duration < 350) { // Hitre kretnje
                // Vodoravni swipe
                if (Math.abs(diffX) > threshold && Math.abs(diffX) > Math.abs(diffY)) {
                    log(`SWIPE: ${diffX > 0 ? 'DESNO (Naprej)' : 'LEVO (Nazaj)'}`);
                } 
                // Navpični swipe
                else if (Math.abs(diffY) > threshold && Math.abs(diffY) > Math.abs(diffX)) {
                    log(`SWIPE: ${diffY > 0 ? 'DOL (Meni?)' : 'GOR'}`);
                }
                // Navaden tap
                else if (Math.abs(diffX) < 10 && Math.abs(diffY) < 10) {
                    const zoneWidth = zone.offsetWidth;
                    if (startX < zoneWidth * 0.15) log("TAP: Levi rob");
                    else if (startX > zoneWidth * 0.85) log("TAP: Desni rob");
                    else log("TAP: Sredina");
                }
            }
        }, { passive: false });

        // LOGIKA ZA SLOVAR (Dolg pritisk)
        target.addEventListener('touchstart', (e) => {
            // Po 600ms ročno izberemo besedo
            targetTimer = setTimeout(() => {
                log("DICTIONARY: Sprožam slovar za 'GORENJSKA'");
                
                // Programska izbira besedila (da vizualno vidiš, kaj je izbrano)
                const range = document.createRange();
                range.selectNodeContents(target);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
                
                // Tukaj v tvojem reader.js odpreš modalno okno
            }, 600);
        });

        target.addEventListener('touchend', () => clearTimeout(targetTimer));
        target.addEventListener('touchmove', () => clearTimeout(targetTimer));

    </script>
</body>
</html>
