<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Reader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    #root { width: 100%; height: 100%; }
  </style>
  <script>
    // Redirect to login before React loads to avoid a flash of the unauthenticated state.
    if (!localStorage.getItem('br_token')) {
      window.location.href = '/login.html?next=' + encodeURIComponent(window.location.href);
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/js/reader_v3.js"></script>
</body>
</html>
