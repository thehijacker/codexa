<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stabilen EPUB Bralnik (2 stolpca)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

	<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>

    <style>
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #1a1a1a; color: white; }
        #controls { padding: 15px; background: #222; display: flex; gap: 10px; justify-content: center; border-bottom: 1px solid #444; }
        #viewer { flex: 1; width: 100%; height: 100%; background: white; }
        button { padding: 10px 20px; cursor: pointer; background: #444; color: white; border: none; border-radius: 5px; }
        button:hover { background: #666; }
        input[type="file"] { color: white; }
    </style>
</head>
<body>

<div id="controls">
    <input type="file" id="input" accept=".epub">
    <button id="prev">◀ Nazaj</button>
    <button id="next">Naprej ▶</button>
</div>

<div id="viewer"></div>

<script>
    let book;
    let rendition;

    document.getElementById('input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => openBook(event.target.result);
            reader.readAsArrayBuffer(file);
        }
    });

    function openBook(data) {
        if (book) { book.destroy(); }
        
        // Stabilen način inicializacije
        book = ePub(data);
        
        rendition = book.renderTo("viewer", {
            width: "100%",
            height: "100%",
            flow: "paginated",
            manager: "default",
            spread: "always" // To prisili dva stolpca (prikaz dveh strani)
        });

        // Prikaži prvo stran
        rendition.display();

        // Navigacija
        document.getElementById('prev').onclick = () => rendition.prev();
        document.getElementById('next').onclick = () => rendition.next();

        // Tipkovnica
        document.addEventListener("keyup", (e) => {
            if (e.key === "ArrowLeft") rendition.prev();
            if (e.key === "ArrowRight") rendition.next();
        }, false);
    }
</script>

</body>
</html>
