<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <script>document.documentElement.style.visibility='hidden'</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Prijava — Codexa</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo h1 {
      font-size: 2rem;
      color: var(--color-accent);
      letter-spacing: 1px;
    }
    .login-logo p {
      color: var(--color-text-muted);
      font-size: .9rem;
      margin-top: .25rem;
    }
    .tabs {
      display: flex;
      border-bottom: 2px solid var(--color-border);
      margin-bottom: 1.5rem;
    }
    .tab-btn {
      flex: 1;
      padding: .65rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      color: var(--color-text-muted);
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
    }
    .tab-btn.active {
      color: var(--color-accent);
      border-bottom-color: var(--color-accent);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .form-group { margin-bottom: 1rem; }
    .submit-btn { width: 100%; margin-top: .5rem; justify-content: center; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <h1><img src="/images/codexa.svg" class="nav-icon nav-icon-codexa" alt="Codexa" style="width:2rem;height:2rem;vertical-align:middle"> Codexa</h1>
      <p data-i18n="login.subtitle">Vaša digitalna knjižnica</p>
    </div>

    <div class="card">
      <div class="tabs" role="tablist">
        <button class="tab-btn active" role="tab" data-tab="login"    data-i18n="login.tab_login">Prijava</button>
        <button class="tab-btn"        role="tab" data-tab="register" data-i18n="login.tab_register">Registracija</button>
      </div>

      <!-- Login -->
      <div class="tab-panel active" id="tab-login">
        <div id="login-alert"></div>
        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="login-username" data-i18n="login.label_username">Uporabniško ime</label>
            <input type="text" id="login-username" autocomplete="username" required />
          </div>
          <div class="form-group">
            <label for="login-password" data-i18n="login.label_password">Geslo</label>
            <input type="password" id="login-password" autocomplete="current-password" required />
          </div>
          <div class="login-lang-row">
            <div id="lang-picker-login"></div>
          </div>
          <button type="submit" class="btn btn-primary submit-btn" id="login-btn" data-i18n="login.btn_submit">Prijava</button>
        </form>
      </div>

      <!-- Register -->
      <div class="tab-panel" id="tab-register">
        <div id="register-alert"></div>
        <form id="register-form" novalidate>
          <div class="form-group">
            <label for="reg-name" data-i18n="login.reg_name">Ime in priimek</label>
            <input type="text" id="reg-name" maxlength="100" data-i18n-placeholder="login.reg_name_placeholder" placeholder="npr. Janez Novak" autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="reg-username" data-i18n="login.label_username">Uporabniško ime</label>
            <input type="text" id="reg-username" autocomplete="username" required
                   data-i18n-placeholder="login.reg_user_placeholder" placeholder="3–32 znakov, brez presledkov" />
          </div>
          <div class="form-group">
            <label for="reg-password" data-i18n="login.label_password">Geslo</label>
            <input type="password" id="reg-password" autocomplete="new-password" required
                   data-i18n-placeholder="login.reg_pass_placeholder" placeholder="Vsaj 8 znakov" />
          </div>
          <div class="form-group">
            <label for="reg-password2" data-i18n="login.reg_password2">Ponovite geslo</label>
            <input type="password" id="reg-password2" autocomplete="new-password" required />
          </div>
          <button type="submit" class="btn btn-primary submit-btn" id="register-btn" data-i18n="login.reg_btn">Ustvari račun</button>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import { apiFetch, setToken } from '/js/api.js';
    import { setButtonLoading }  from '/js/ui.js';
    import { initI18n, t, initIconLangPicker } from '/js/i18n.js';

    await initI18n();
    initIconLangPicker(document.getElementById('lang-picker-login'));

    // Redirect if already logged in
    const existingToken = localStorage.getItem('br_token');
    if (existingToken) window.location.href = '/';

    // ── Check registration status ─────────────────────────────────────────────
    (async () => {
      try {
        const data = await apiFetch('/auth/registration-status');
        if (!data.enabled) {
          const regBtn = document.querySelector('[data-tab="register"]');
          if (regBtn) regBtn.style.display = 'none';
        }
      } catch (_) { /* silently ignore */ }
    })();

    // ── Tabs ─────────────────────────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn, .tab-panel').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
      });
    });

    function showAlert(id, message, type = 'error') {
      const el = document.getElementById(id);
      el.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
    }
    function clearAlert(id) {
      document.getElementById(id).innerHTML = '';
    }

    // ── Login ─────────────────────────────────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert('login-alert');
      const btn      = document.getElementById('login-btn');
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;

      if (!username || !password) {
        showAlert('login-alert', t('login.err_fill_all'));
        return;
      }

      setButtonLoading(btn, true);
      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ username, password }),
        });
        setToken(data.token);
        localStorage.setItem('br_user', JSON.stringify(data.user));
        window.location.href = '/';
      } catch (err) {
        showAlert('login-alert', err.message);
        setButtonLoading(btn, false, t('login.btn_submit'));
      }
    });

    // ── Register ──────────────────────────────────────────────────────────────
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert('register-alert');
      const btn      = document.getElementById('register-btn');
      const username = document.getElementById('reg-username').value.trim();
      const password = document.getElementById('reg-password').value;
      const password2 = document.getElementById('reg-password2').value;

      if (!username || !password || !password2) {
        showAlert('register-alert', t('login.err_fill_all'));
        return;
      }
      if (password !== password2) {
        showAlert('register-alert', t('login.err_no_match'));
        return;
      }
      if (password.length < 8) {
        showAlert('register-alert', t('login.err_pass_short'));
        return;
      }

      setButtonLoading(btn, true);
      try {
        const name = document.getElementById('reg-name').value.trim();
        const data = await apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({ name, username, password }),
        });
        setToken(data.token);
        localStorage.setItem('br_user', JSON.stringify(data.user));
        window.location.href = '/';
      } catch (err) {
        showAlert('register-alert', err.message);
        setButtonLoading(btn, false, t('login.reg_btn'));
      }
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/js/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
