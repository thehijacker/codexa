<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <script>document.documentElement.style.visibility='hidden'</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Prijava — Codexa</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo h1 {
      font-size: 2rem;
      color: var(--color-accent);
      letter-spacing: 1px;
    }
    .login-logo p {
      color: var(--color-text-muted);
      font-size: .9rem;
      margin-top: .25rem;
    }
    .tabs {
      display: flex;
      border-bottom: 2px solid var(--color-border);
      margin-bottom: 1.5rem;
    }
    .tab-btn {
      flex: 1;
      padding: .65rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      color: var(--color-text-muted);
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
    }
    .tab-btn.active {
      color: var(--color-accent);
      border-bottom-color: var(--color-accent);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .form-group { margin-bottom: 1rem; }
    .submit-btn { width: 100%; margin-top: .5rem; justify-content: center; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <h1><img src="/images/codexa.svg" class="nav-icon nav-icon-codexa" alt="Codexa" style="width:2rem;height:2rem;vertical-align:middle"> Codexa</h1>
      <p data-i18n="login.subtitle">Vaša digitalna knjižnica</p>
    </div>

    <div class="card">
      <div class="tabs" role="tablist">
        <button class="tab-btn active" role="tab" data-tab="login"    data-i18n="login.tab_login">Prijava</button>
        <button class="tab-btn"        role="tab" data-tab="register" data-i18n="login.tab_register">Registracija</button>
      </div>

      <!-- Login -->
      <div class="tab-panel active" id="tab-login">
        <div id="login-alert"></div>
        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="login-username" data-i18n="login.label_username">Uporabniško ime</label>
            <input type="text" id="login-username" autocomplete="username" required />
          </div>
          <div class="form-group">
            <label for="login-password" data-i18n="login.label_password">Geslo</label>
            <input type="password" id="login-password" autocomplete="current-password" required />
          </div>
          <div class="login-lang-row">
            <div id="lang-picker-login"></div>
          </div>
          <button type="submit" class="btn btn-primary submit-btn" id="login-btn" data-i18n="login.btn_submit">Prijava</button>
        </form>
      </div>

      <!-- Register -->
      <div class="tab-panel" id="tab-register">
        <div id="register-alert"></div>
        <form id="register-form" novalidate>
          <div class="form-group">
            <label for="reg-name" data-i18n="login.reg_name">Ime in priimek</label>
            <input type="text" id="reg-name" maxlength="100" data-i18n-placeholder="login.reg_name_placeholder" placeholder="npr. Janez Novak" autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="reg-username" data-i18n="login.label_username">Uporabniško ime</label>
            <input type="text" id="reg-username" autocomplete="username" required
                   data-i18n-placeholder="login.reg_user_placeholder" placeholder="3–32 znakov, brez presledkov" />
          </div>
          <div class="form-group">
            <label for="reg-password" data-i18n="login.label_password">Geslo</label>
            <input type="password" id="reg-password" autocomplete="new-password" required
                   data-i18n-placeholder="login.reg_pass_placeholder" placeholder="Vsaj 8 znakov" />
          </div>
          <div class="form-group">
            <label for="reg-password2" data-i18n="login.reg_password2">Ponovite geslo</label>
            <input type="password" id="reg-password2" autocomplete="new-password" required />
          </div>
          <button type="submit" class="btn btn-primary submit-btn" id="register-btn" data-i18n="login.reg_btn">Ustvari račun</button>
        </form>
      </div>
    </div>
    <div id="eink-toggle-row" style="display:none;flex-direction:row;align-items:center;justify-content:space-between;margin-top:.75rem;padding:.5rem 0">
      <span style="font-size:.85rem;color:var(--color-text-muted)" data-i18n="settings.eink_mode">E-ink mode</span>
      <label class="toggle">
        <input type="checkbox" id="login-eink-toggle">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <script type="module" src="/js/login.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
